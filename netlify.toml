[build]
  command = "npm run build"
  publish = ".next"
  environment = { NODE_VERSION = "20", SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY" }

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Netlify will auto-detect functions if you use Netlify Functions.
  # If you use Netlify Edge Functions or special routing, configure here.